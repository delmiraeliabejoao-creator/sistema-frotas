{% extends "base.html" %}

{% block conteudo %}
<style>
    .login-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        width: 100%;
        max-width: 450px;
        background: var(--cor-meio-escuro);
        border-radius: 20px;
        border: 1px solid var(--cor-borda);
        box-shadow: 0 12px 40px rgba(0, 217, 255, 0.12);
        position: relative;
        overflow: hidden;
    }
    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--cor-primaria), var(--cor-destaque));
    }
    .login-header {
        text-align: center;
        padding: 2.2rem 2rem 1rem;
    }
    .login-header i {
        font-size: 3.5rem;
        color: var(--cor-primaria);
        filter: drop-shadow(0 0 12px var(--cor-glow));
        margin-bottom: 1rem;
    }
    .login-header h3 {
        color: var(--cor-texto-claro);
        font-weight: 700;
        margin-bottom: 0.5rem;
    }
    .login-header p {
        color: var(--cor-texto-suave);
    }
    .login-body {
        padding: 1rem 2rem 2.5rem;
    }
    .btn-login {
        width: 100%;
        padding: 0.9rem;
        border-radius: 10px;
        font-weight: 600;
        background: linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria));
        border: none;
        color: white;
        box-shadow: 0 4px 16px rgba(0, 217, 255, 0.25);
        transition: all 0.3s ease;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(0, 217, 255, 0.4);
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-lock"></i>
            <h3>Acesso ao Sistema</h3>
            <p>Gestão de Frotas: Florestal e Cabeçote</p>
        </div>
        <div class="login-body">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control-moderno w-100" placeholder="seu.email@empresa.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control-moderno w-100" placeholder="Digite sua senha" required>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
