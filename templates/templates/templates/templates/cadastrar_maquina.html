{% extends "base.html" %}

{% block conteudo %}
<div class="card-moderno">
    <div class="card-header-moderno">
        <i class="bi bi-gear-wide-connected me-2"></i> Cadastrar Equipamento
    </div>
    <div class="card-body-moderno">
        <form method="POST">
            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Tipo de Frota</label>
                    <select name="tipo_frota" class="form-control-moderno w-100" required>
                        <option value="">Selecione...</option>
                        <option value="Frota Florestal">Frota Florestal</option>
                        <option value="Frota Cabeçote">Frota Cabeçote</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Código Interno</label>
                    <input type="text" name="codigo" class="form-control-moderno w-100" placeholder="Ex: TRT-001 / CBC-005" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Modelo / Descrição</label>
                    <input type="text" name="modelo" class="form-control-moderno w-100" placeholder="Ex: Trator Florestal / Caminhão Cabeçote" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ano de Fabricação</label>
                    <input type="number" name="ano" class="form-control-moderno w-100" placeholder="Ex: 2020">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Número de Série</label>
                    <input type="text" name="serie" class="form-control-moderno w-100" placeholder="Número de série/chassi">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Placa</label>
                    <input type="text" name="placa" class="form-control-moderno w-100" placeholder="Placa ou identificação">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Horímetro / Quilometragem Inicial</label>
                    <input type="number" step="0.1" name="horimetro" class="form-control-moderno w-100" placeholder="Ex: 0.0">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Localização / Filial</label>
                    <input type="text" name="localizacao" class="form-control-moderno w-100" placeholder="Ex: Base Matriz, Área Sul">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary btn-moderno me-3">
                        <i class="bi bi-save me-1"></i> Cadastrar
                    </button>
                    <a href="/" class="btn btn-outline-secondary btn-moderno">
                        <i class="bi bi-arrow-left me-1"></i> Voltar
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
