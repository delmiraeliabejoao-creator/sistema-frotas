{% extends "base.html" %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card-moderno mt-5">
            <div class="card-header-moderno bg-success">
                <i class="bi bi-shield-lock me-2"></i>Redefinir Senha
            </div>
            <div class="card-body-moderno p-4">
                <p class="text-muted mb-4">Crie uma nova senha para acessar o sistema. Ela deve ter pelo menos 6 caracteres.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Nova Senha</label>
                        <input type="password" name="nova_senha" class="form-control-moderno w-100" required minlength="6" placeholder="Digite a nova senha">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Confirmar Nova Senha</label>
                        <input type="password" name="confirmar_senha" class="form-control-moderno w-100" required minlength="6" placeholder="Repita a senha">
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-moderno">
                        <i class="bi bi-check-lg me-2"></i>Salvar Nova Senha
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
