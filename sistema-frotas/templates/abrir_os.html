{% extends "base.html" %}

{% block conteudo %}
<div class="card-moderno">
    <div class="card-header-moderno">
        <i class="bi bi-file-earmark-plus me-2"></i> Abrir Nova Ordem de Serviço
    </div>
    <div class="card-body-moderno">
        <form method="POST" enctype="multipart/form-data">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Equipamento</label>
                    <select name="maquina_id" class="form-control-moderno w-100" required>
                        <option value="">Selecione o equipamento</option>
                        {% for maq in maquinas %}
                        <option value="{{ maq.id }}">{{ maq.codigo_interno }} - {{ maq.modelo }} ({{ maq.tipo_frota }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo de Serviço</label>
                    <select name="tipo_id" class="form-control-moderno w-100" required>
                        <option value="">Selecione o tipo de serviço</option>
                        {% for tipo in tipos %}
                        <option value="{{ tipo.id }}">{{ tipo.descricao }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Horímetro / Quilometragem Atual</label>
                    <input type="number" step="0.1" name="horimetro" class="form-control-moderno w-100" placeholder="Ex: 12450.5" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Prioridade</label>
                    <select name="prioridade" class="form-control-moderno w-100" required>
                        <option value="Baixa">Baixa</option>
                        <option value="Média" selected>Média</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Descrição Detalhada do Problema/Serviço</label>
                    <textarea name="descricao" rows="4" class="form-control-moderno w-100" placeholder="Descreva detalhadamente o que deve ser feito ou o defeito apresentado..." required></textarea>
                </div>

                <!-- Campo de Upload de Fotos -->
                <div class="col-12">
                    <label class="form-label">Fotos do Equipamento / Defeito</label>
                    <input type="file" name="fotos" multiple accept="image/*" class="form-control-moderno w-100" style="padding: 0.7rem;">
                    <small class="text-muted d-block mt-1">
                        <i class="bi bi-info-circle me-1"></i>
                        Formatos permitidos: JPG, PNG, GIF. Você pode selecionar várias fotos de uma vez. Tamanho máximo por arquivo: 16MB.
                    </small>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary btn-moderno me-3">
                        <i class="bi bi-check-circle me-1"></i> Abrir Ordem de Serviço
                    </button>
                    <a href="/listar-os" class="btn btn-outline-secondary btn-moderno">
                        <i class="bi bi-arrow-left me-1"></i> Voltar
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
