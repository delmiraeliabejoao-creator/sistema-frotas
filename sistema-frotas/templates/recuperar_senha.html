{% extends "base.html" %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card-moderno mt-5">
            <div class="card-header-moderno bg-warning text-dark">
                <i class="bi bi-key me-2"></i>Recuperar Senha
            </div>
            <div class="card-body-moderno p-4">
                <p class="text-muted mb-4">Informe o e-mail cadastrado no sistema para receber o link de redefinição de senha.</p>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-medium">E-mail</label>
                        <input type="email" name="email" class="form-control-moderno w-100" required placeholder="seu@email.com.br">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 btn-moderno text-dark fw-medium">
                        <i class="bi bi-envelope me-2"></i>Enviar Solicitação
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <a href="/login" class="text-decoration-none text-primary">Voltar para a página de acesso</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
